<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Sistema de Gestão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --carvao:#1E1F24;
    --carvao-2:#2B2D33;
    --carvao-3:#3A3C44;
    --laranja:#FF6A2B;
    --laranja-dark:#E2571E;
    --laranja-light:#FFE4D6;
    --rosa:#F03C96;
    --rosa-dark:#D42E82;
    --rosa-light:#FFE1F0;
    --bg:#F4F3F6;
    --card:#FFFFFF;
    --text:#1E1F24;
    --text-2:#4B4D55;
    --gray:#8A8C94;
    --line:#E9E8EC;
    --green:#1FAE6E;
    --green-light:#E3F8EF;
    --shadow: 0 1px 2px rgba(30,31,36,0.04), 0 8px 24px -12px rgba(30,31,36,0.12);
    --radius: 16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Plus Jakarta Sans', sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
  }
  ::selection{ background: var(--laranja-light); }
  .mono{ font-family:'DM Mono', monospace; }
  button{ font-family:inherit; cursor:pointer; border:none; }
  input, select, textarea{ font-family:inherit; }
  a{ color:inherit; text-decoration:none; }

  /* ========== LOGIN ========== */
  #login-screen{
    min-height:100vh;
    display:grid;
    grid-template-columns: 1.05fr 1fr;
  }
  @media (max-width: 900px){ #login-screen{ grid-template-columns: 1fr; } .login-visual{ display:none; } }

  .login-visual{
    background:
      radial-gradient(circle at 20% 15%, rgba(255,106,43,0.35), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(240,60,150,0.35), transparent 45%),
      var(--carvao);
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:56px;
    position:relative;
    overflow:hidden;
  }
  .login-visual::before{
    content:"";
    position:absolute; inset:0;
    background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 42px 42px;
    -webkit-mask-image: radial-gradient(circle at 50% 40%, black, transparent 70%);
            mask-image: radial-gradient(circle at 50% 40%, black, transparent 70%);
  }
  .brand-mark{ display:flex; align-items:center; gap:12px; position:relative; z-index:1;}
  .brand-mark .logo-box{
    width:40px; height:40px; border-radius:12px;
    background:linear-gradient(135deg, var(--laranja), var(--rosa));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:18px;
  }
  .brand-mark span{ font-weight:800; font-size:20px; letter-spacing:0.5px; }

  .login-copy{ position:relative; z-index:1; max-width:460px; }
  .login-copy .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
    padding:6px 14px; border-radius:100px; font-size:12px; font-weight:600;
    color:var(--laranja-light); margin-bottom:22px; letter-spacing:0.3px;
  }
  .login-copy h1{ font-size:38px; line-height:1.15; font-weight:800; margin-bottom:16px; }
  .login-copy h1 em{ font-style:normal; background:linear-gradient(135deg, var(--laranja), var(--rosa)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .login-copy p{ color:#C9C9D2; font-size:15px; line-height:1.6; }

  .login-stats{ display:flex; gap:36px; position:relative; z-index:1; }
  .login-stats div b{ display:block; font-size:24px; font-weight:800; }
  .login-stats div span{ font-size:12px; color:#A6A6B0; }

  .login-form-panel{
    display:flex; align-items:center; justify-content:center; padding:40px;
  }
  .login-form{ width:100%; max-width:380px; }
  .login-form h2{ font-size:24px; font-weight:800; margin-bottom:6px; }
  .login-form > p.sub{ color:var(--gray); font-size:14px; margin-bottom:28px; }

  .role-toggle{
    display:flex; background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:4px; margin-bottom:22px;
  }
  .role-toggle button{
    flex:1; padding:10px 12px; border-radius:9px; background:transparent; font-weight:700; font-size:13px; color:var(--gray);
    transition: all .15s ease;
  }
  .role-toggle button.active{ background:var(--carvao); color:#fff; box-shadow:var(--shadow); }

  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:6px; }
  .field input{
    width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--line); background:#fff;
    font-size:14px; color:var(--text); transition:border-color .15s ease;
  }
  .field input:focus{ outline:none; border-color:var(--laranja); }

  .btn-primary{
    width:100%; padding:13px; border-radius:12px; border:none;
    background:linear-gradient(135deg, var(--laranja), var(--rosa)); color:#fff; font-weight:700; font-size:14px;
    box-shadow:0 10px 20px -8px rgba(240,60,150,0.45);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn-primary:hover{ transform:translateY(-1px); box-shadow:0 14px 24px -8px rgba(240,60,150,0.55); }
  .btn-primary:active{ transform:translateY(0); }
  .btn-primary:focus-visible{ outline:2px solid var(--carvao); outline-offset:2px; }

  .divider-text{
    display:flex; align-items:center; gap:12px; color:var(--gray); font-size:12px; margin:20px 0;
  }
  .divider-text::before, .divider-text::after{ content:""; flex:1; height:1px; background:var(--line); }

  .quick-row{ display:flex; gap:10px; }
  .btn-quick{
    flex:1; padding:11px; border-radius:10px; border:1.5px solid var(--line); background:#fff; font-weight:700; font-size:12.5px;
    display:flex; align-items:center; justify-content:center; gap:6px; color:var(--text);
    transition: border-color .15s ease, background .15s ease;
  }
  .btn-quick:hover{ border-color:var(--carvao); background:var(--bg); }
  .btn-quick:focus-visible{ outline:2px solid var(--carvao); outline-offset:2px; }

  .login-foot{ margin-top:26px; font-size:12px; color:var(--gray); text-align:center; }
  .login-error{
    display:none; background:var(--rosa-light); color:var(--rosa-dark); border-radius:10px; padding:10px 12px;
    font-size:12.5px; font-weight:600; margin-bottom:16px;
  }

  #first-access-screen{
    display:none; min-height:100vh; align-items:center; justify-content:center; background:var(--bg); padding:20px;
  }
  #first-access-screen.show{ display:flex; }

  /* ========== APP SHELL ========== */
  #app{ display:none; min-height:100vh; }
  .shell{ display:grid; grid-template-columns: 240px 1fr; min-height:100vh; }
  @media (max-width: 860px){ .shell{ grid-template-columns: 1fr; } .sidebar{ display:none; } }

  .sidebar{
    background:var(--carvao); color:#fff; padding:26px 16px; display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
  }
  .sidebar .brand-mark{ padding:0 10px; margin-bottom:8px; }
  .sidebar .role-pill{
    margin:14px 10px 22px; padding:8px 12px; border-radius:10px; background:var(--carvao-2);
    font-size:11px; font-weight:700; color:#B9BAC2; display:flex; align-items:center; gap:8px;
  }
  .sidebar .role-pill .dot{ width:7px; height:7px; border-radius:50%; background:var(--laranja); }
  .nav-item{
    display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:11px; margin-bottom:4px;
    color:#AEAFB8; font-weight:600; font-size:14px; background:transparent; width:100%; text-align:left;
    transition: background .15s ease, color .15s ease;
  }
  .nav-item svg{ width:18px; height:18px; flex-shrink:0; opacity:.85; }
  .nav-item:hover{ background:var(--carvao-2); color:#fff; }
  .nav-item.active{ background:linear-gradient(135deg, var(--laranja), var(--rosa)); color:#fff; }
  .nav-item:focus-visible{ outline:2px solid var(--laranja); outline-offset:2px; }
  .nav-spacer{ flex:1; }
  .sidebar-foot{
    background:var(--carvao-2); border-radius:14px; padding:14px; display:flex; align-items:center; gap:10px; margin-top:10px;
  }
  .sidebar-foot .av{ width:34px; height:34px; border-radius:9px; background:var(--rosa); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; }
  .sidebar-foot .who{ flex:1; min-width:0; }
  .sidebar-foot .who b{ display:block; font-size:12.5px; font-weight:700; }
  .sidebar-foot .who span{ font-size:11px; color:#9B9CA6; }
  .logout-btn{ background:transparent; color:#9B9CA6; padding:6px; border-radius:8px; }
  .logout-btn:hover{ color:#fff; background:rgba(255,255,255,0.08); }

  .main{ padding:28px 34px; max-width:1400px; }
  .topbar{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:26px; gap:20px; flex-wrap:wrap; }
  .topbar h1{ font-size:26px; font-weight:800; }
  .topbar .sub{ color:var(--gray); font-size:13.5px; margin-top:4px; }
  .topbar-right{ display:flex; align-items:center; gap:12px; }

  .bell-wrap{ position:relative; }
  .bell-btn{
    width:42px; height:42px; border-radius:12px; background:var(--card); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .bell-btn:focus-visible{ outline:2px solid var(--carvao); outline-offset:2px; }
  .bell-btn svg{ width:19px; height:19px; color:var(--carvao); }
  .bell-badge{
    position:absolute; top:-4px; right:-4px; background:var(--rosa); color:#fff; font-size:10px; font-weight:800;
    min-width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg);
  }
  .notif-panel{
    display:none; position:absolute; right:0; top:52px; width:340px; background:var(--card); border-radius:14px;
    box-shadow:var(--shadow); border:1px solid var(--line); overflow:hidden; z-index:40;
  }
  .notif-panel.open{ display:block; }
  .notif-panel .np-head{ padding:14px 16px; font-weight:800; font-size:13.5px; border-bottom:1px solid var(--line); }
  .notif-item{ padding:13px 16px; border-bottom:1px solid var(--line); display:flex; gap:10px; }
  .notif-item:last-child{ border-bottom:none; }
  .notif-dot{ width:8px; height:8px; border-radius:50%; margin-top:6px; flex-shrink:0; background:var(--laranja); }
  .notif-item p{ font-size:12.5px; color:var(--text); font-weight:600; line-height:1.4; }
  .notif-item span{ font-size:11px; color:var(--gray); }

  .avatar-btn{ width:42px; height:42px; border-radius:12px; background:var(--rosa); color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center; font-size:13px; }

  /* Cards / grid utilities */
  .grid{ display:grid; gap:18px; }
  .g4{ grid-template-columns:repeat(4,1fr); }
  .g3{ grid-template-columns:repeat(3,1fr); }
  .g2{ grid-template-columns:2fr 1fr; }
  @media (max-width:1100px){ .g4{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:1fr;} .g2{grid-template-columns:1fr;} }

  .card{ background:var(--card); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); }
  .card-head{ display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .card-head .bar{ width:5px; height:16px; border-radius:3px; background:var(--laranja); }
  .card-head h3{ font-size:15px; font-weight:800; }

  .kpi{ position:relative; padding-left:24px; }
  .kpi::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:5px; border-radius:4px; background:var(--laranja); }
  .kpi.pink::before{ background:var(--rosa); }
  .kpi label{ display:block; font-size:12px; font-weight:700; color:var(--gray); margin-bottom:8px; }
  .kpi .val{ font-size:25px; font-weight:800; margin-bottom:8px; }
  .kpi .delta{ font-size:12px; font-weight:700; }
  .delta.up{ color:var(--green); }
  .delta.down{ color:var(--rosa); }

  table{ width:100%; border-collapse:collapse; }
  thead th{ text-align:left; font-size:11.5px; color:var(--gray); font-weight:700; padding:8px 12px; background:#FAFAFB; border-radius:8px; }
  tbody td{ padding:12px; font-size:13px; border-bottom:1px solid var(--line); color:var(--text-2); }
  tbody tr:last-child td{ border-bottom:none; }
  tbody td b{ color:var(--text); }

  .badge{ display:inline-flex; align-items:center; padding:4px 11px; border-radius:100px; font-size:11px; font-weight:800; color:#fff; }
  .b-green{ background:var(--green); }
  .b-laranja{ background:var(--laranja); }
  .b-rosa{ background:var(--rosa); }
  .b-carvao{ background:var(--carvao-3); }

  .bars{ display:flex; align-items:flex-end; gap:14px; height:180px; padding-top:10px; }
  .bars .col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:8px; }
  .bars .col .b{ width:100%; border-radius:8px 8px 4px 4px; transition:height .5s ease; }
  .bars .col span{ font-size:11px; color:var(--gray); font-weight:600; }

  .donut{ width:150px; height:150px; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; position:relative; }
  .donut .hole{ width:82px; height:82px; background:var(--card); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:19px; }
  .legend{ display:flex; flex-direction:column; gap:8px; margin-top:16px; }
  .legend div{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-2); font-weight:600; }
  .legend .sq{ width:11px; height:11px; border-radius:3px; }

  .priobar{ margin-bottom:14px; }
  .priobar .lbl{ display:flex; justify-content:space-between; font-size:12px; font-weight:700; margin-bottom:6px; }
  .priobar .track{ height:9px; border-radius:6px; background:var(--line); overflow:hidden; }
  .priobar .fill{ height:100%; border-radius:6px; }

  .btn-mini{ padding:9px 16px; border-radius:10px; font-weight:700; font-size:12.5px; }
  .btn-mini.solid{ background:var(--laranja); color:#fff; }
  .btn-mini.solid:hover{ background:var(--laranja-dark); }
  .btn-mini.ghost{ background:var(--bg); border:1px solid var(--line); color:var(--text-2); }
  .btn-mini:focus-visible{ outline:2px solid var(--carvao); outline-offset:2px; }

  /* Personalização */
  .swatches{ display:flex; gap:12px; flex-wrap:wrap; }
  .swatch{ width:34px; height:34px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:transform .1s ease; }
  .swatch:hover{ transform:scale(1.08); }
  .swatch.selected{ border-color:var(--carvao); }
  .logo-upload{
    width:96px; height:96px; border-radius:16px; border:2px dashed var(--line); background:var(--bg);
    display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--gray); font-size:13px; flex-shrink:0;
  }
  select.select-input, input.text-input{
    width:100%; padding:11px 14px; border-radius:10px; border:1.5px solid var(--line); background:#fff; font-size:13.5px; color:var(--text);
  }
  select.select-input:focus, input.text-input:focus{ outline:none; border-color:var(--laranja); }
  .preview-frame{ border:1px solid var(--line); border-radius:14px; overflow:hidden; background:var(--bg); }
  .preview-topbar{ display:flex; }
  .preview-side{ width:130px; padding:16px 10px; color:#fff; }
  .preview-main{ flex:1; padding:16px; }

  /* Client portal specifics */
  .hero-cta{
    border-radius:16px; padding:26px; color:#fff; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
    background:linear-gradient(135deg, var(--laranja), var(--rosa));
  }
  .hero-cta h2{ font-size:19px; font-weight:800; margin-bottom:6px; }
  .hero-cta p{ font-size:13px; opacity:0.92; }
  .hero-cta button{ background:#fff; color:var(--laranja-dark); padding:12px 20px; border-radius:12px; font-weight:800; font-size:13.5px; white-space:nowrap; }
  .hero-cta button:hover{ transform:translateY(-1px); }

  .update-strip{ background:var(--rosa-light); color:var(--rosa-dark); border-radius:12px; padding:13px 16px; display:flex; align-items:center; gap:10px; font-size:12.5px; font-weight:700; margin:18px 0; }

  .ticket-tabs{ display:flex; gap:8px; margin-bottom:16px; }
  .ticket-tab{ padding:9px 16px; border-radius:10px; font-weight:700; font-size:13px; background:var(--bg); color:var(--text-2); }
  .ticket-tab.active{ background:var(--carvao); color:#fff; }

  .ticket-card{
    background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .ticket-card .t-title{ font-weight:700; font-size:13.5px; margin-bottom:3px; }
  .ticket-card .t-meta{ font-size:11.5px; color:var(--gray); }

  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:700px){ .form-grid{ grid-template-columns:1fr; } }
  .field-l label{ display:block; font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:7px; }
  textarea.text-input{ resize:vertical; min-height:110px; font-family:inherit; width:100%; box-sizing:border-box; }

  .toast{
    position:fixed; bottom:26px; right:26px; background:var(--carvao); color:#fff; padding:14px 20px; border-radius:12px;
    font-size:13px; font-weight:700; box-shadow:var(--shadow); display:flex; align-items:center; gap:10px;
    transform:translateY(20px); opacity:0; pointer-events:none; transition:all .25s ease; z-index:100;
  }
  .toast.show{ transform:translateY(0); opacity:1; }
  .toast .tdot{ width:8px; height:8px; border-radius:50%; background:var(--green); }

  .empty-note{ color:var(--gray); font-size:13px; padding:20px 4px; }

  /* ---- Sidebar submenu ---- */
  .nav-group{ margin-bottom:4px; }
  .nav-item .chev{ margin-left:auto; width:14px; height:14px; opacity:.75; transition:transform .2s ease; flex-shrink:0; }
  .nav-item .chev.open{ transform:rotate(180deg); }
  .nav-submenu{ max-height:0; overflow:hidden; transition:max-height .25s ease; }
  .nav-submenu.open{ max-height:260px; }
  .nav-subitem{
    display:flex; align-items:center; width:100%; text-align:left; padding:9px 14px 9px 36px;
    border-radius:9px; background:transparent; color:#9B9CA6; font-size:13px; font-weight:600;
    margin:2px 0; position:relative; transition:background .15s ease, color .15s ease;
  }
  .nav-subitem::before{ content:""; position:absolute; left:20px; width:5px; height:5px; border-radius:50%; background:#5A5B63; }
  .nav-subitem:hover{ background:var(--carvao-2); color:#fff; }
  .nav-subitem.active{ background:var(--carvao-2); color:#fff; }
  .nav-subitem.active::before{ background:var(--laranja); }
  .nav-subitem:focus-visible{ outline:2px solid var(--laranja); outline-offset:1px; }

  /* ---- Modal ---- */
  .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(30,31,36,0.55); z-index:80; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--card); border-radius:18px; max-width:560px; width:100%; padding:26px; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow); position:relative; }
  .modal-box h3{ font-size:18px; font-weight:800; margin-bottom:4px; padding-right:36px; }
  .modal-box .m-sub{ color:var(--gray); font-size:12.5px; margin-bottom:18px; }
  .modal-close{ position:absolute; top:20px; right:20px; background:var(--bg); width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; color:var(--text-2); }
  .modal-close:hover{ background:var(--line); }
  .kv-row{ display:flex; justify-content:space-between; gap:14px; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .kv-row span:first-child{ color:var(--gray); font-weight:600; }
  .kv-row span:last-child{ font-weight:700; text-align:right; }
  .history-item{ background:var(--bg); border-radius:10px; padding:10px 12px; font-size:12px; margin-bottom:8px; color:var(--text-2); }

  /* ---- Status select in tables ---- */
  .status-select{ padding:7px 10px; border-radius:8px; border:1.5px solid var(--line); font-size:11.5px; font-weight:700; background:#fff; color:var(--text); }
  .status-select:focus{ outline:none; border-color:var(--laranja); }

  /* ---- Stage progress (orçamentos) ---- */
  .stage-track{ height:7px; border-radius:5px; background:var(--line); overflow:hidden; margin-top:6px; width:120px; }
  .stage-fill{ height:100%; border-radius:5px; transition:width .3s ease; }

  /* ---- Client / cadastro rows ---- */
  .client-row{
    display:flex; align-items:center; gap:14px; padding:14px; border:1px solid var(--line); border-radius:12px; margin-bottom:10px;
  }
  .client-row .c-logo{ width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; flex-shrink:0; }

function isoDate(offsetDays){
  const d = new Date();
  d.setDate(d.getDate()+offsetDays);
  return d.toISOString().slice(0,10);
}
function fmtBRL(n){
  return 'R$ ' + (Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});
}
function mesReferencia(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const now = new Date();
  const dIdx = d.getFullYear()*12 + d.getMonth();
  const nIdx = now.getFullYear()*12 + now.getMonth();
  if(dIdx===nIdx) return { label:'Mês Atual', cls:'b-laranja', group:'atual' };
  if(dIdx===nIdx+1) return { label:'Próximo Mês', cls:'b-rosa', group:'proximo' };
  if(dIdx<nIdx) return { label:'Atrasado', cls:'b-carvao', group:'atrasado' };
  return { label:d.toLocaleDateString('pt-BR',{month:'short',year:'numeric'}), cls:'b-carvao', group:'outro' };
}
function shade(hex){
  const c = hex.replace('#','');
  const num = parseInt(c,16);
  let r=(num>>16)-30, g=((num>>8)&0xff)-30, b=(num&0xff)-30;
  r=Math.max(0,r); g=Math.max(0,g); b=Math.max(0,b);
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');
}
function monthlySeries(caixaList, months){
  const now = new Date();
  const arr = [];
  for(let i=months-1;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    let label = d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    label = label.charAt(0).toUpperCase()+label.slice(1);
    const total = caixaList.filter(e=>{
      const ed = new Date(e.vencimento+'T00:00:00');
      return ed.getFullYear()===d.getFullYear() && ed.getMonth()===d.getMonth();
    }).reduce((s,e)=>s+e.valor,0);
    arr.push({ label, total });
  }
  return arr;
}
function gradientFromSegments(segments){
  let acc = 0;
  const parts = segments.map(s=>{ const start=acc; acc+=s.pct; return `${s.color} ${start}% ${acc}%`; });
  return `conic-gradient(${parts.join(', ')})`;
}

/* ============================================================
   EMPRESA > PAINEL FINANCEIRO (dinâmico)
============================================================ */
function PageFinanceiro({ tickets, caixa, orcamentos, gastos, terceirizados, clientes }){
  const emAtendimento = tickets.filter(t=>t.status==='em_atendimento').length;
  const aguardando = tickets.filter(t=>t.status==='aguardando_retorno').length;
  const encerrados = tickets.filter(t=>t.status==='encerrado').length;
  const recentes = tickets.slice(0,4);

  const recebimentosMes = caixa.filter(e=>mesReferencia(e.vencimento).group==='atual').reduce((s,e)=>s+e.valor,0);
  const comissoesAtivas = orcamentos.filter(o=>o.status!=='Reprovado').reduce((s,o)=>s+o.comissao,0);
  const recebimentosTotal = recebimentosMes + comissoesAtivas;
  const gastosMes = gastos.filter(g=>mesReferencia(g.vencimento).group==='atual').reduce((s,g)=>s+g.valor,0);
  const gastosFuturos = gastos.filter(g=>mesReferencia(g.vencimento).group==='proximo').reduce((s,g)=>s+g.valor,0);
  const saldoAtual = recebimentosTotal - gastosMes;

  const series = monthlySeries(caixa, 6);
  const maxV = Math.max(1, ...series.map(s=>s.total));

  const seg = { Premium:0, 'Padrão':0, 'Básico':0 };
  clientes.forEach(c=>{
    const v = c.valorMensal||0;
    if(v>=800) seg.Premium++; else if(v>=400) seg['Padrão']++; else seg['Básico']++;
  });
  const totalClientes = Math.max(1, clientes.length);
  const segArr = [
    { label:'Premium', pct: Math.round(seg.Premium/totalClientes*100), color:'var(--laranja)' },
    { label:'Padrão', pct: Math.round(seg['Padrão']/totalClientes*100), color:'var(--rosa)' },
    { label:'Básico', pct: Math.round(seg['Básico']/totalClientes*100), color:'var(--carvao-3)' },
  ];

  function servicoStatus(clienteNome){
    const cts = tickets.filter(t=>t.cliente===clienteNome);
    if(cts.some(t=>t.status==='em_atendimento')) return {label:'Em curso', cls:'b-laranja'};
    if(cts.some(t=>t.status==='aguardando_retorno')) return {label:'Pendente', cls:'b-rosa'};
    return {label:'Concluído', cls:'b-green'};
  }

  return (
    <React.Fragment>
      <div className="card" style={{marginBottom:18}}>
        <div className="card-head"><div className="bar" style={{background:'var(--rosa)'}}></div><h3>Suporte — Visão Geral</h3></div>
        <div className="grid g4" style={{marginBottom:16}}>
          <Kpi label="Em Atendimento" value={String(emAtendimento)} delta="chamados ativos" dir="up"/>
          <Kpi label="Aguardando Retorno" value={String(aguardando)} delta="do cliente" dir="down" tone="pink"/>
          <Kpi label="Encerrados" value={String(encerrados)} delta="total" dir="up"/>
          <Kpi label="SLA Médio" value="3h 40m" delta="ilustrativo" dir="up" tone="pink"/>
        </div>
        <table><thead><tr><th>Cliente</th><th>Chamado</th><th>Status</th><th>Data</th></tr></thead>
          <tbody>
            {recentes.map(t=>(
              <tr key={t.id}><td><b>{t.cliente}</b></td><td>{t.id} · {t.title}</td><td><span className={"badge "+STATUS_BADGE[t.status]}>{STATUS_LABELS[t.status]}</span></td><td>{t.date}</td></tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="grid g4" style={{marginBottom:18}}>
        <Kpi label="Gastos do mês" value={fmtBRL(gastosMes)} delta="mês atual" dir="down"/>
        <Kpi label="Recebimentos + Comissões" value={fmtBRL(recebimentosTotal)} delta="mês atual" dir="up" tone="pink"/>
        <Kpi label="Saldo Atual" value={fmtBRL(saldoAtual)} delta={saldoAtual>=0?'positivo':'negativo'} dir={saldoAtual>=0?'up':'down'}/>
        <Kpi label="Gastos Futuros Previstos" value={fmtBRL(gastosFuturos)} delta="próximo mês" dir="down" tone="pink"/>
      </div>

      <div className="grid g2" style={{marginBottom:18}}>
        <div className="card">
          <div className="card-head"><div className="bar"></div><h3>Gráfico Financeiro — Últimos 6 meses</h3></div>
          <div className="bars">
            {series.map((s,i)=>(<BarCol key={i} h={Math.max(6,(s.total/maxV)*140)} color={i%2===0?'var(--laranja)':'var(--rosa)'} label={s.label}/>))}
          </div>
        </div>
        <div className="card">
          <div className="card-head"><div className="bar" style={{background:'var(--rosa)'}}></div><h3>Clientes por Segmento</h3></div>
          <div className="donut" style={{background:gradientFromSegments(segArr)}}><div className="hole">{clientes.length}</div></div>
          <div className="legend">
            {segArr.map(s=>(<div key={s.label}><span className="sq" style={{background:s.color}}></span>{s.label} — {s.pct}%</div>))}
          </div>
        </div>
      </div>

      <div className="grid g3">
        <div className="card">
          <div className="card-head"><div className="bar"></div><h3>Orçamentos (Produtos e Comissões)</h3></div>
          <table><thead><tr><th>Cliente</th><th>Produto</th><th>Comissão</th></tr></thead>
            <tbody>{orcamentos.slice(0,4).map(o=>(<tr key={o.id}><td><b>{o.cliente}</b></td><td>{o.item}</td><td>{fmtBRL(o.comissao)}</td></tr>))}</tbody>
          </table>
        </div>
        <div className="card">
          <div className="card-head"><div className="bar" style={{background:'var(--rosa)'}}></div><h3>Serviços Prestados</h3></div>
          <table><thead><tr><th>Serviço</th><th>Cliente</th><th>Status</th></tr></thead>
            <tbody>{clientes.slice(0,4).map(c=>{ const st=servicoStatus(c.nome); return (
              <tr key={c.id}><td><b>{c.servico}</b></td><td>{c.nome}</td><td><span className={"badge "+st.cls}>{st.label}</span></td></tr>
            );})}</tbody>
          </table>
        </div>
        <div className="card">
          <div className="card-head"><div className="bar" style={{background:'var(--carvao-3)'}}></div><h3>Serviços Terceirizados</h3></div>
          <table><thead><tr><th>Parceiro</th><th>Serviço</th><th>Custo</th></tr></thead>
            <tbody>{terceirizados.map(t=>(<tr key={t.id}><td><b>{t.parceiro}</b></td><td>{t.servico}</td><td>{fmtBRL(t.custo)}</td></tr>))}</tbody>
          </table>
        </div>
      </div>
    </React.Fragment>
  );
}

        <Kpi label="A Receber — Próximo Mês" value={fmtBRL(totalProximo)} delta={withRef.filter(e=>e.ref.group==='proximo').length+' lançamento(s)'} dir="up" tone="pink"/>
        <Kpi label="Em Atraso" value={fmtBRL(totalAtrasado)} delta={withRef.filter(e=>e.ref.group==='atrasado').length+' lançamento(s)'} dir={totalAtrasado>0?'down':'up'}/>

        <button className={"ticket-tab "+(view==='lancamento'?'active':'')} onClick={()=>{ if(view!=='lancamento'){ setEditing(null);} setView('lancamento');}}>{editing?'Editar Lançamento':'+ Novo Lançamento'}</button>

        ? <FinCaixaForm editingEntry={editingEntry} clientes={clientes} onSave={(data)=>{ onSave(data, editing); setView('lista'); setEditing(null); }} onCancel={()=>{setView('lista'); setEditing(null);}}/>
        : <FinCaixaList entries={caixa} onEdit={(id)=>{setEditing(id); setView('lancamento');}} onDelete={onDelete}/>

  );
}

/* ============================================================
   EMPRESA > FINANCEIRO > ORÇAMENTOS (usa catálogo de serviços)
============================================================ */
function PageFinOrcamentos({ orcamentos, clientes, servicos, onAdd, onStatusChange, goPage }){
  const [cliente,setCliente] = useState(clientes[0]?.nome || '');
  const [itemName,setItemName] = useState(servicos[0]?.nome || '');
  const [valor,setValor] = useState(servicos[0] ? String(servicos[0].valor) : '');
  const [comissao,setComissao] = useState(servicos[0] ? (servicos[0].valor*servicos[0].comissaoPercent/100).toFixed(2) : '');

  function onServicoChange(nome){
    setItemName(nome);
    const s = servicos.find(x=>x.nome===nome);
    if(s){ setValor(String(s.valor)); setComissao((s.valor*s.comissaoPercent/100).toFixed(2)); }
  }
  function onValorChange(v){
    setValor(v);
    setComissao(((parseFloat(v)||0)*0.2).toFixed(2));
  }
  function submit(e){
    e.preventDefault();
    if(!itemName || !valor) return;
    onAdd({ cliente, item:itemName, valor:parseFloat(valor), comissao:parseFloat(comissao)||0 });
  }

  return (
    <div className="grid" style={{gridTemplateColumns:'1fr 1.5fr', gap:18, alignItems:'start'}}>
      <div className="card">
        <div className="card-head"><div className="bar"></div><h3>Novo Orçamento</h3></div>
        <form onSubmit={submit}>
          <div className="field-l" style={{marginBottom:14}}>
            <label>Cliente</label>
            <select className="select-input" value={cliente} onChange={e=>setCliente(e.target.value)}>
              {clientes.map(c=><option key={c.id}>{c.nome}</option>)}
            </select>
          </div>
          <div className="field-l" style={{marginBottom:14}}>
            <label>Produto / Serviço</label>
            <select className="select-input" value={itemName} onChange={e=>onServicoChange(e.target.value)}>
              {servicos.map(s=><option key={s.id} value={s.nome}>{s.nome} — {fmtBRL(s.valor)}</option>)}
            </select>
          </div>
          <div className="form-grid" style={{marginBottom:20}}>
            <div className="field-l"><label>Valor (R$)</label><input type="number" step="0.01" min="0" className="text-input" value={valor} onChange={e=>onValorChange(e.target.value)} required/></div>
            <div className="field-l"><label>Comissão (R$)</label><input type="number" step="0.01" min="0" className="text-input" value={comissao} onChange={e=>setComissao(e.target.value)} required/></div>
          </div>
          <button className="btn-mini solid" type="submit">Salvar Orçamento</button>
        </form>
        <p style={{fontSize:11.5,color:'var(--gray)',marginTop:14}}>Não encontrou o serviço? Cadastre em <a href="#" onClick={(e)=>{e.preventDefault(); goPage('fin-servicos');}} style={{color:'var(--laranja)', fontWeight:700}}>Financeiro → Serviços</a>.</p>
      </div>
      <div className="card">
        <div className="card-head"><div className="bar" style={{background:'var(--rosa)'}}></div><h3>Orçamentos e Andamento</h3></div>
        <table><thead><tr><th>Cliente</th><th>Item</th><th>Valor</th><th>Comissão</th><th>Andamento</th></tr></thead>
          <tbody>
            {orcamentos.map(o=>(
              <tr key={o.id}>
                <td><b>{o.cliente}</b></td><td>{o.item}</td><td>{fmtBRL(o.valor)}</td><td>{fmtBRL(o.comissao)}</td>
                <td>
                  <select className="status-select" value={o.status} onChange={e=>onStatusChange(o.id, e.target.value)}>
                    {Object.keys(ORC_STAGES).map(s=><option key={s}>{s}</option>)}
                  </select>
                  <div className="stage-track"><div className="stage-fill" style={{width:ORC_STAGES[o.status]+'%', background:ORC_COLOR[o.status]}}></div></div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ============================================================
   EMPRESA > FINANCEIRO > SERVIÇOS (editar/excluir)
============================================================ */
function PageFinServicos({ servicos, setServicos, showToast }){
  const [editing, setEditing] = useState(null);
  const editingObj = editing ? servicos.find(s=>s.id===editing) : null;
  const [nome,setNome] = useState('');
  const [valor,setValor] = useState('');
  const [comissao,setComissao] = useState('');

  useEffect(()=>{
    if(editingObj){ setNome(editingObj.nome); setValor(String(editingObj.valor)); setComissao(String(editingObj.comissaoPercent)); }
    else { setNome(''); setValor(''); setComissao(''); }
  }, [editing]);

  function submit(e){
    e.preventDefault();
    if(!nome || valor==='' || comissao==='') return;
    if(editing){
      setServicos(prev=>prev.map(s=>s.id===editing?{...s, nome, valor:parseFloat(valor), comissaoPercent:parseFloat(comissao)}:s));
      showToast('Serviço atualizado com sucesso!');
    } else {
      setServicos(prev=>[...prev, { id:uid('srv'), nome, valor:parseFloat(valor), comissaoPercent:parseFloat(comissao) }]);
      showToast('Serviço cadastrado com sucesso!');
    }
    setEditing(null);
  }
  function remove(id){
    if(!window.confirm('Excluir este serviço?')) return;
    setServicos(prev=>prev.filter(s=>s.id!==id));
    if(editing===id) setEditing(null);
    showToast('Serviço excluído.');
  }

  return (
    <div className="grid" style={{gridTemplateColumns:'1fr 1.4fr', gap:18, alignItems:'start'}}>
      <div className="card">
        <div className="card-head"><div className="bar"></div><h3>{editing?'Editar Serviço':'Novo Serviço'}</h3></div>
        <form onSubmit={submit}>
          <div className="field-l" style={{marginBottom:14}}>
            <label>Nome do Serviço</label>
            <input className="text-input" value={nome} onChange={e=>setNome(e.target.value)} placeholder="Ex: Suporte N3" required/>
          </div>
          <div className="form-grid" style={{marginBottom:20}}>
            <div className="field-l"><label>Valor Padrão (R$)</label><input type="number" step="0.01" min="0" className="text-input" value={valor} onChange={e=>setValor(e.target.value)} placeholder="0,00" required/></div>
            <div className="field-l"><label>Comissão (%)</label><input type="number" step="1" min="0" max="100" className="text-input" value={comissao} onChange={e=>setComissao(e.target.value)} placeholder="20" required/></div>
          </div>
          <div className="form-actions">
            <button className="btn-mini solid" type="submit">{editing?'Salvar Alterações':'Cadastrar Serviço'}</button>
            {editing && <button className="btn-mini ghost" type="button" onClick={()=>setEditing(null)}>Cancelar</button>}
          </div>
        </form>
      </div>
      <div className="card">
        <div className="card-head"><div className="bar" style={{background:'var(--rosa)'}}></div><h3>Serviços Cadastrados ({servicos.length})</h3></div>
        <table><thead><tr><th>Serviço</th><th>Valor Padrão</th><th>Comissão</th><th></th></tr></thead>
          <tbody>
            {servicos.map(s=>(
              <tr key={s.id}>
                <td><b>{s.nome}</b></td><td>{fmtBRL(s.valor)}</td><td>{s.comissaoPercent}%</td>
                <td>
                  <div className="row-actions">
                    <button className="icon-btn-sm ghost" onClick={()=>setEditing(s.id)}>Editar</button>
                    <button className="icon-btn-sm danger" onClick={()=>remove(s.id)}>Excluir</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <p style={{fontSize:11.5,color:'var(--gray)',marginTop:14}}>Estes serviços ficam disponíveis para seleção rápida na aba <b>Orçamentos</b>.</p>
      </div>
    </div>
  );
}

/* ============================================================
   EMPRESA > DASHBOARD DE CLIENTES (dinâmico)
============================================================ */
function PageDashboardClientes({ clientes, tickets, onPersonalizar }){
  const totalClientes = clientes.length;
  const abertos = tickets.filter(t=>t.status!=='encerrado').length;
  const encerrados = tickets.filter(t=>t.status==='encerrado').length;
  const emAtendimento = tickets.filter(t=>t.status==='em_atendimento').length;
  const aguardando = tickets.filter(t=>t.status==='aguardando_retorno').length;

  function clienteStatus(nome){
    const cts = tickets.filter(t=>t.cliente===nome);
    const open = cts.filter(t=>t.status!=='encerrado').length;
    if(cts.some(t=>t.status==='em_atendimento')) return { label:'Ativo', cls:'b-laranja', open };
    if(cts.some(t=>t.status==='aguardando_retorno')) return { label:'Em atendimento', cls:'b-rosa', open };
    return { label:'Concluído', cls:'b-green', open };
  }

  const totalT = Math.max(1, tickets.length);
  const donutParts = [
    { label:'Ativos', val:emAtendimento, color:'var(--rosa)' },
    { label:'Aguardando', val:aguardando, color:'var(--laranja)' },
    { label:'Encerrados', val:encerrados, color:'var(--carvao-3)' },
  ];
  const donutSegs = donutParts.map(p=>({ pct: Math.round(p.val/totalT*100), color:p.color }));

  const prioCount = { Alta:0, 'Média':0, Baixa:0 };
  tickets.filter(t=>t.status!=='encerrado').forEach(t=>{ if(prioCount[t.priority]!==undefined) prioCount[t.priority]++; });
  const maxPrio = Math.max(1, ...Object.values(prioCount));

  return (
    <React.Fragment>
      <div className="grid g4" style={{marginBottom:18}}>
        <Kpi label="Total de Clientes" value={String(totalClientes)} delta="cadastrados" dir="up"/>
        <Kpi label="Chamados Abertos" value={String(abertos)} delta="em andamento" dir="down" tone="pink"/>
        <Kpi label="Chamados Encerrados" value={String(encerrados)} delta="total" dir="up"/>
        <Kpi label="SLA Médio de Atendimento" value="3h 40m" delta="ilustrativo" dir="up" tone="pink"/>
      </div>
      <div className="grid g2">
        <div className="card">
          <div className="card-head"><div className="bar"></div><h3>Clientes — Serviço Prestado &amp; Suporte Técnico</h3></div>
          <table><thead><tr><th>Cliente</th><th>Serviço Prestado</th><th>Suporte</th><th>Chamados</th></tr></thead>
            <tbody>
              {clientes.map(c=>{ const st=clienteStatus(c.nome); return (
                <tr key={c.id}><td><b>{c.nome}</b></td><td>{c.servico}</td><td><span className={"badge "+st.cls}>{st.label}</span></td><td>{st.open} aberto(s)</td></tr>
              );})}
              {clientes.length===0 && <tr><td colSpan="4" className="empty-note-sm">Nenhum cliente cadastrado.</td></tr>}
            </tbody>
          </table>
        </div>
        <div>
          <div className="card" style={{marginBottom:18}}>
            <div className="card-head"><div className="bar" style={{background:'var(--rosa)'}}></div><h3>Status dos Chamados</h3></div>
            <div className="donut" style={{background:gradientFromSegments(donutSegs)}}><div className="hole">{tickets.length}</div></div>
            <div className="legend">
              {donutParts.map(p=>(<div key={p.label}><span className="sq" style={{background:p.color}}></span>{p.label} — {p.val}</div>))}
            </div>
          </div>
          <div className="card">
            <div className="card-head"><div className="bar"></div><h3>Suporte — Prioridade</h3></div>
            {Object.keys(prioCount).map(k=>(
              <PrioBar key={k} label={k} val={prioCount[k]} max={maxPrio} color={k==='Alta'?'var(--rosa)':k==='Média'?'var(--laranja)':'var(--carvao-3)'}/>
            ))}
          </div>
        </div>
      </div>
      <div className="card" style={{marginTop:18}}>
        <div className="card-head"><div className="bar" style={{background:'var(--rosa)'}}></div><h3>Todos os Clientes com Sistema — Personalização</h3></div>
        {clientes.map(c=>(
          <div className="client-row" key={c.id}>
            <div className="c-logo" style={{background:c.primary}}>{c.initial}</div>
            <div className="c-info"><b>{c.empresa}</b><span>{c.nome} · {c.servico}</span></div>
            <div style={{display:'flex', gap:6}} title="Cor primária / secundária">
              <span className="swatch-mini" style={{background:c.primary}}></span>
              <span className="swatch-mini" style={{background:c.secondary}}></span>
            </div>
            <button className="btn-mini ghost" onClick={()=>onPersonalizar(c.id)}>Personalizar</button>
          </div>
        ))}
        {clientes.length===0 && <p className="empty-note-sm">Nenhum cliente cadastrado.</p>}
      </div>
    </React.Fragment>
  );
}

/* ============================================================

function PageCliAcessos({ contas, setContas, showToast }){
  const [editing, setEditing] = useState(null);
  const editingObj = editing ? contas.find(a=>a.id===editing) : null;
  const [nome,setNome]=useState(''); const [empresa,setEmpresa]=useState('');
  const [email,setEmail]=useState(''); const [senha,setSenha]=useState('');
  const [forcarNovoAcesso,setForcar]=useState(false);

  useEffect(()=>{
    if(editingObj){ setNome(editingObj.nome); setEmpresa(editingObj.empresa); setEmail(editingObj.email); setSenha(''); setForcar(false); }
    else { setNome(''); setEmpresa(''); setEmail(''); setSenha(''); setForcar(false); }
  }, [editing]);

  function submit(e){
    e.preventDefault();
    if(!nome||!empresa||!email) return;
    if(editing){
      setContas(prev=>prev.map(a=>a.id===editing?{...a, nome, empresa, email, senha: senha?senha:a.senha, primeiroAcesso: forcarNovoAcesso ? true : a.primeiroAcesso }:a));
      showToast('Acesso atualizado com sucesso!');
    } else {
      if(!senha) return;
      setContas(prev=>[...prev, { id:uid('acc'), nome, empresa, email, senha, primeiroAcesso:true }]);
      showToast('Acesso criado! O cliente vai definir a senha no primeiro login.');
    }
    setEditing(null);
  }
  function remove(id){
    if(!window.confirm('Excluir este acesso?')) return;
    setContas(prev=>prev.filter(a=>a.id!==id));
    if(editing===id) setEditing(null);
    showToast('Acesso excluído.');
  }

  return (
    <div className="grid" style={{gridTemplateColumns:'1fr 1.4fr', gap:18, alignItems:'start'}}>
      <div className="card">
        <div className="card-head"><div className="bar"></div><h3>{editing?'Editar Acesso':'Novo Acesso de Cliente'}</h3></div>
        <form onSubmit={submit}>
          <div className="field-l" style={{marginBottom:14}}><label>Nome</label><input className="text-input" value={nome} onChange={e=>setNome(e.target.value)} required/></div>
          <div className="field-l" style={{marginBottom:14}}><label>Empresa</label><input className="text-input" value={empresa} onChange={e=>setEmpresa(e.target.value)} required/></div>
          <div className="field-l" style={{marginBottom:14}}><label>E-mail</label><input type="email" className="text-input" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
          <div className="field-l" style={{marginBottom:14}}>
            <label>{editing? 'Nova Senha (opcional)':'Senha Temporária'}</label>
            <input type="password" className="text-input" value={senha} onChange={e=>setSenha(e.target.value)} placeholder={editing?'Deixe em branco para manter':''} required={!editing}/>
          </div>
          {editing && (
            <label style={{display:'flex', alignItems:'center', gap:8, fontSize:12.5, color:'var(--text-2)', marginBottom:20, fontWeight:600}}>
              <input type="checkbox" checked={forcarNovoAcesso} onChange={e=>setForcar(e.target.checked)} />
              Solicitar definição de nova senha no próximo login
            </label>
          )}
          <div className="form-actions">
            <button className="btn-mini solid" type="submit">{editing?'Salvar Alterações':'Criar Acesso'}</button>
            {editing && <button className="btn-mini ghost" type="button" onClick={()=>setEditing(null)}>Cancelar</button>}
          </div>
        </form>
        <p style={{fontSize:11.5,color:'var(--gray)',marginTop:14}}>No primeiro login, o cliente será solicitado a definir uma nova senha antes de entrar no portal.</p>
      </div>
      <div className="card">
        <div className="card-head"><div className="bar" style={{background:'var(--rosa)'}}></div><h3>Acessos Criados ({contas.length})</h3></div>
        <table><thead><tr><th>Nome</th><th>Empresa</th><th>E-mail</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {contas.map(a=>(
              <tr key={a.id}>
                <td><b>{a.nome}</b></td><td>{a.empresa}</td><td>{a.email}</td>
                <td><span className={"badge "+(a.primeiroAcesso?'b-laranja':'b-green')}>{a.primeiroAcesso?'Primeiro acesso pendente':'Ativo'}</span></td>
                <td>
                  <div className="row-actions">
                    <button className="icon-btn-sm ghost" onClick={()=>setEditing(a.id)}>Editar</button>
                    <button className="icon-btn-sm danger" onClick={()=>remove(a.id)}>Excluir</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ============================================================
   CLIENTE > Início / Meus Chamados / Nova Solicitação / Perfil
============================================================ */
function PageInicio({ tickets, clientName, branding, clienteNotifs, onGoNova }){
  const meus = tickets.filter(t=>t.cliente===clientName);
  const abertos = meus.filter(t=>t.status!=='encerrado');
  const encerrados = meus.filter(t=>t.status==='encerrado');
  const lastNotif = clienteNotifs[0];
  return (
    <React.Fragment>
      <div className="hero-cta" style={{background:`linear-gradient(135deg, ${branding.primary}, ${shade(branding.primary)})`}}>
        <div><h2>Precisa de suporte?</h2><p>Abra uma nova solicitação e nossa equipe entrará em contato.</p></div>
        <button onClick={onGoNova}>+ Nova Solicitação</button>
      </div>
      <div className="update-strip">🔔 {lastNotif ? lastNotif.text : 'Nenhuma atualização recente.'}</div>
      <div className="grid g3" style={{marginBottom:18}}>
        <Kpi label="Chamados Abertos" value={String(abertos.length)} delta={abertos.length+' em andamento'} dir="down" tone="pink"/>
        <Kpi label="Chamados Encerrados" value={String(encerrados.length)} delta="este mês" dir="up"/>
        <Kpi label="Tempo Médio de Resposta" value="2h 10m" delta="ilustrativo" dir="up"/>
      </div>
      <div className="grid" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="card">
          <div className="card-head"><div className="bar" style={{background:'var(--rosa)'}}></div><h3>Chamados em Aberto</h3></div>
          {abertos.length ? abertos.map(t=><TicketRow t={t} key={t.id}/>) : <p className="empty-note">Nenhum chamado em aberto.</p>}
        </div>
        <div className="card">
          <div className="card-head"><div className="bar"></div><h3>Chamados Encerrados</h3></div>
          {encerrados.length ? encerrados.slice(0,4).map(t=><TicketRow t={t} key={t.id}/>) : <p className="empty-note">Nenhum chamado encerrado ainda.</p>}
        </div>
      </div>
    </React.Fragment>
  );
}
function PageChamados({ tickets, clientName }){
  const [tab, setTab] = useState('aberto');
  const meus = tickets.filter(t=>t.cliente===clientName);
  const abertos = meus.filter(t=>t.status!=='encerrado');
  const encerrados = meus.filter(t=>t.status==='encerrado');
  const list = tab==='aberto' ? abertos : encerrados;
  return (
    <div className="card">
      <div className="ticket-tabs">
        <button className={"ticket-tab "+(tab==='aberto'?'active':'')} onClick={()=>setTab('aberto')}>Em Aberto ({abertos.length})</button>
        <button className={"ticket-tab "+(tab==='encerrado'?'active':'')} onClick={()=>setTab('encerrado')}>Encerrados ({encerrados.length})</button>
      </div>
      <div>{list.length ? list.map(t=><TicketRow t={t} key={t.id}/>) : <p className="empty-note">Nada por aqui ainda.</p>}</div>
    </div>
  );
}
function PageNova({ branding, onSubmit }){
  const [assunto,setAssunto]=useState('');
  const [prioridade,setPrioridade]=useState('Média');
  const [categoria,setCategoria]=useState('Suporte técnico');
  const [descricao,setDescricao]=useState('');

  function submit(e){
    e.preventDefault();
    if(!assunto || !descricao) return;
    onSubmit({ assunto, prioridade, categoria, descricao });
    setAssunto(''); setDescricao('');
  }

  return (
    <div className="card wide-form">
      <div className="card-head"><div className="bar" style={{background:branding.primary}}></div><h3>Descreva sua solicitação</h3></div>
      <form onSubmit={submit}>
        <div className="form-grid" style={{marginBottom:16}}>
          <div className="field-l">
            <label>Assunto</label>
            <input className="text-input" value={assunto} onChange={e=>setAssunto(e.target.value)} placeholder="Ex: Erro ao acessar o sistema" required/>
          </div>
          <div className="field-l">
            <label>Prioridade</label>
            <select className="select-input" value={prioridade} onChange={e=>setPrioridade(e.target.value)}>
              <option>Baixa</option><option>Média</option><option>Alta</option>
            </select>
          </div>
        </div>
        <div className="field-l" style={{marginBottom:16}}>
          <label>Categoria</label>
          <select className="select-input" value={categoria} onChange={e=>setCategoria(e.target.value)}>
            <option>Suporte técnico</option><option>Financeiro</option><option>Dúvida geral</option><option>Solicitação de acesso</option>
          </select>
        </div>
        <div className="field-l" style={{marginBottom:22}}>
          <label>Descrição do problema</label>
          <textarea className="text-input wide" value={descricao} onChange={e=>setDescricao(e.target.value)} placeholder="Conte com detalhes o que está acontecendo..." required></textarea>
        </div>
        <button className="btn-mini solid" type="submit" style={{background:branding.primary}}>Enviar Solicitação</button>
      </form>
    </div>
  );
}
function PagePerfil({ clientName, branding, contas }){
  const acc = contas.find(a=>a.nome===clientName);
  return (
    <div className="card" style={{maxWidth:520}}>
      <div className="card-head"><div className="bar" style={{background:branding.primary}}></div><h3>Meus Dados</h3></div>
      <div className="field-l" style={{marginBottom:14}}><label>Nome</label><input className="text-input" value={clientName} disabled/></div>
      <div className="field-l" style={{marginBottom:14}}><label>Empresa</label><input className="text-input" value={branding.name} disabled/></div>
      <div className="field-l" style={{marginBottom:14}}><label>E-mail</label><input className="text-input" value={acc?acc.email:''} disabled/></div>
      <div className="field-l"><label>Plano de Suporte</label><input className="text-input" value="Premium" disabled/></div>
    </div>
  );
}

/* ============================================================
   APP
============================================================ */
function App(){
  const [loggedIn,setLoggedIn] = useState(false);
  const [role,setRole] = useState('empresa');
  const [page,setPage] = useState('financeiro');
  const [expandedGroups,setExpandedGroups] = useState({financeiro:true, clientes:true});
  const clientName = 'Ana Souza';
  const [branding,setBranding] = useState({ name:'Souza Tecnologia', initial:'S', primary:'#FF6A2B', secondary:'#1E1F24' });

  const [clientes,setClientes] = useState(initialClientes);
  const [servicos,setServicos] = useState(initialServicos);
  const [contas,setContas] = useState(initialContas);
  const [tickets,setTickets] = useState(initialTickets);
  const [caixa,setCaixa] = useState(initialCaixa);
  const [orcamentos,setOrcamentos] = useState(initialOrcamentos);
  const [gastos] = useState(initialGastos);
  const [terceirizados] = useState(initialTerceirizados);
  const [empresaNotifs,setEmpresaNotifs] = useState(initialEmpresaNotifs);
  const [clienteNotifs,setClienteNotifs] = useState(initialClienteNotifs);

  const [notifOpen,setNotifOpen] = useState(false);
  const [modalTicketId,setModalTicketId] = useState(null);
  const [toastMsg,setToastMsg] = useState(null);
  const toastTimer = useRef(null);

  const [personalizacaoSelectedId,setPersonalizacaoSelectedId] = useState(initialClientes[0].id);
  const [pendingAccount,setPendingAccount] = useState(null);

  useEffect(()=>{
    function handler(e){ if(!e.target.closest('.bell-wrap')) setNotifOpen(false); }
    document.addEventListener('click', handler);
    return ()=>document.removeEventListener('click', handler);
  },[]);

  function showToast(msg){
    setToastMsg(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToastMsg(null), 3200);
  }

  function toggleGroup(id){
    setExpandedGroups(prev=>({...prev,[id]:!prev[id]}));
    setPage(id);
  }
  function goPage(id){
    setPage(id);
    if(id.startsWith('fin-')) setExpandedGroups(prev=>({...prev, financeiro:true}));
    if(id==='personalizacao'||id==='cli-acessos') setExpandedGroups(prev=>({...prev, clientes:true}));
  }

  function handleBellClick(){
    const opening = !notifOpen;
    setNotifOpen(opening);
    if(opening){
      if(role==='empresa') setEmpresaNotifs(prev=>prev.map(n=>({...n,lido:true})));
      else setClienteNotifs(prev=>prev.map(n=>({...n,lido:true})));
    }
  }

  function attemptLogin(chosenRole){
    if(chosenRole==='empresa'){
      setLoggedIn(true); setRole('empresa'); setPage('financeiro');
      return;
    }
    const acc = contas.find(a=>a.nome===clientName);
    if(acc && acc.primeiroAcesso){ setPendingAccount(acc); }
    else { loginAsCliente(); }
  }
  function loginAsCliente(){
    const c = clientes.find(x=>x.nome===clientName) || clientes[0];
    if(c) setBranding({ name:c.empresa, initial:c.initial, primary:c.primary, secondary:c.secondary });
    setLoggedIn(true); setRole('cliente'); setPage('inicio');
  }
  function confirmNewPassword(newPass){
    setContas(prev=>prev.map(a=>a.id===pendingAccount.id?{...a, senha:newPass, primeiroAcesso:false}:a));
    setPendingAccount(null);
    loginAsCliente();
    showToast('Senha definida com sucesso!');
  }
  function logout(){
    setLoggedIn(false);
    setNotifOpen(false);
  }

  function addClienteNotif(text){ setClienteNotifs(prev=>[{id:uid('cn'), text, time:'agora mesmo', lido:false}, ...prev]); }
  function addEmpresaNotif(text){ setEmpresaNotifs(prev=>[{id:uid('en'), text, time:'agora mesmo', lido:false}, ...prev]); }

  function updateTicketStatus(id, status){
    setTickets(prev=>prev.map(t=>t.id===id?{...t,status}:t));
    addClienteNotif(`Atualização no chamado ${id}: status alterado para "${STATUS_LABELS[status]}"`);
    showToast('Status do chamado ' + id + ' atualizado');
  }
  function sendInfo(id, msg){
    setTickets(prev=>prev.map(t=>t.id===id?{...t, status:'aguardando_retorno', history:[...t.history, {text:`Equipe solicitou: "${msg}"`, time:'agora mesmo'}]}:t));
    addClienteNotif(`O suporte pediu mais informações no chamado ${id}`);
    showToast('Solicitação enviada ao cliente');
    setModalTicketId(null);
  }
  function submitNovaSolicitacao(data){
    const id = '#' + (1053 + tickets.length + Math.floor(Math.random()*89));
    setTickets(prev=>[{ id, cliente:clientName, title:data.assunto, status:'em_atendimento', priority:data.prioridade, date:'Agora mesmo', categoria:data.categoria, descricao:data.descricao, history:[] }, ...prev]);
    addEmpresaNotif(`Novo chamado aberto por ${clientName} — "${data.assunto}"`);
    showToast('Solicitação enviada com sucesso!');
    setPage('chamados');
  }

  function saveClient(data, editingId){
    if(editingId){
      setClientes(prev=>prev.map(c=>c.id===editingId?{...c, ...data}:c));
      showToast('Cliente atualizado com sucesso!');
    } else {
      const color = PALETTE[clientes.length % PALETTE.length];
      setClientes(prev=>[...prev, { id:uid('cli'), ...data, empresa:data.nome, primary:color, secondary:'#1E1F24', initial:data.nome.charAt(0).toUpperCase() }]);
      showToast('Cliente cadastrado com sucesso!');
    }
  }
  function deleteClient(id){
    if(!window.confirm('Excluir este cliente? Essa ação não pode ser desfeita.')) return;
    setClientes(prev=>prev.filter(c=>c.id!==id));
    showToast('Cliente excluído.');
  }

  function saveCaixa(data, editingId){
    if(editingId){
      setCaixa(prev=>prev.map(e=>e.id===editingId?{...e, ...data}:e));
      showToast('Lançamento atualizado com sucesso!');
    } else {
      setCaixa(prev=>[...prev, { id:uid('cx'), ...data }]);
      const ref = mesReferencia(data.vencimento);
      showToast('Lançamento adicionado — somado ao total de "' + ref.label + '"');
    }
  }
  function deleteCaixa(id){
    if(!window.confirm('Excluir este lançamento?')) return;
    setCaixa(prev=>prev.filter(e=>e.id!==id));
    showToast('Lançamento excluído.');
  }

  function addOrcamento(data){
    setOrcamentos(prev=>[{ id:uid('orc'), ...data, status:'Em análise' }, ...prev]);
    showToast('Orçamento cadastrado!');
  }
  function updateOrcamentoStatus(id, status){
    setOrcamentos(prev=>prev.map(o=>o.id===id?{...o,status}:o));
    showToast('Andamento atualizado para "' + status + '"');
  }

  if(pendingAccount){
    return <FirstAccessScreen account={pendingAccount} onDone={confirmNewPassword}/>;
  }
  if(!loggedIn){
    const stats = { clientes: clientes.length, encerrados: tickets.filter(t=>t.status==='encerrado').length, sla:'3h40m' };
    return <LoginScreen onSubmitLogin={attemptLogin} stats={stats}/>;
  }

  const meta = PAGE_META(clientName)[page] || { title:'', sub:'' };
  const notifs = role==='empresa' ? empresaNotifs : clienteNotifs;
  const avatarInitials = role==='empresa' ? 'CS' : branding.initial;
  const modalTicket = modalTicketId ? tickets.find(t=>t.id===modalTicketId) : null;

  return (
    <div id="app" style={{display:'block'}}>
      <div className="shell">
        <Sidebar role={role} page={page} expandedGroups={expandedGroups} toggleGroup={toggleGroup} goPage={goPage} branding={branding} clientName={clientName} onLogout={logout}/>
        <main className="main">
          <Topbar title={meta.title} sub={meta.sub} notifs={notifs} notifOpen={notifOpen} onBellClick={handleBellClick} role={role} branding={branding} avatarInitials={avatarInitials}/>
          <div id="page-content">
            {role==='empresa' && page==='financeiro' && <PageFinanceiro tickets={tickets} caixa={caixa} orcamentos={orcamentos} gastos={gastos} terceirizados={terceirizados} clientes={clientes}/>}
            {role==='empresa' && page==='fin-clientes' && <PageFinClientes clientes={clientes} onSave={saveClient} onDelete={deleteClient}/>}
            {role==='empresa' && page==='fin-caixa' && <PageFinCaixa caixa={caixa} clientes={clientes} onSave={saveCaixa} onDelete={deleteCaixa}/>}
            {role==='empresa' && page==='fin-orcamentos' && <PageFinOrcamentos orcamentos={orcamentos} clientes={clientes} servicos={servicos} onAdd={addOrcamento} onStatusChange={updateOrcamentoStatus} goPage={goPage}/>}
            {role==='empresa' && page==='fin-servicos' && <PageFinServicos servicos={servicos} setServicos={setServicos} showToast={showToast}/>}
            {role==='empresa' && page==='fin-chamados' && <PageFinChamados tickets={tickets} onOpenModal={setModalTicketId} onStatusChange={updateTicketStatus}/>}
            {role==='empresa' && page==='clientes' && <PageDashboardClientes clientes={clientes} tickets={tickets} onPersonalizar={(id)=>{ setPersonalizacaoSelectedId(id); goPage('personalizacao'); }}/>}
            {role==='empresa' && page==='personalizacao' && <PagePersonalizacao clientes={clientes} setClientes={setClientes} selectedId={personalizacaoSelectedId} setSelectedId={setPersonalizacaoSelectedId} clientName={clientName} setBranding={setBranding} showToast={showToast}/>}
            {role==='empresa' && page==='cli-acessos' && <PageCliAcessos contas={contas} setContas={setContas} showToast={showToast}/>}

            {role==='cliente' && page==='inicio' && <PageInicio tickets={tickets} clientName={clientName} branding={branding} clienteNotifs={clienteNotifs} onGoNova={()=>setPage('nova')}/>}
            {role==='cliente' && page==='chamados' && <PageChamados tickets={tickets} clientName={clientName}/>}
            {role==='cliente' && page==='nova' && <PageNova branding={branding} onSubmit={submitNovaSolicitacao}/>}
            {role==='cliente' && page==='perfil' && <PagePerfil clientName={clientName} branding={branding} contas={contas}/>}
          </div>
        </main>
      </div>
      <TicketModal ticket={modalTicket} onClose={()=>setModalTicketId(null)} onSendInfo={sendInfo}/>
      <Toast msg={toastMsg}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
